{% extends 'base.html' %}
{% block title %}Registrar{% endblock %}
{% block content %}
  <div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6">Cadastro de Usuário</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="text-{{ 'red' if category=='error' else 'green' }}-600 mb-4">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div>
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" required class="mt-1 block w-full px-4 py-2 border rounded focus:border-orange-500 focus:ring-orange-500">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="text" name="email" id="email" required class="mt-1 block w-full px-4 py-2 border rounded focus:border-orange-500 focus:ring-orange-500">
      </div>
      <div class="mt-4">
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" required class="mt-1 block w-full px-4 py-2 border rounded focus:border-orange-500 focus:ring-orange-500">
      </div>
      <div class="mt-6 text-center">
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded focus:outline-none focus:ring-2 focus:ring-orange-500">Cadastrar</button>
      </div>
    </form>
  </div>
{% endblock %}
